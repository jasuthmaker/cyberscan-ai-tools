<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Address Classifier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0B0F1A; color: #E6EAF2; font-family: 'Segoe UI', sans-serif; }
    .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
    .glow  { box-shadow: 0 0 24px rgba(79,140,255,0.3); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease both; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-lg">
    <div class="text-center mb-10 fade-up">
      <div class="text-4xl mb-3">🌐</div>
      <h1 class="text-3xl font-bold text-white mb-2">IP Classifier</h1>
      <p class="text-gray-400">Classify any IPv4 or IPv6 address instantly.</p>
    </div>

    <div class="glass rounded-2xl p-6 mb-6 fade-up" style="animation-delay:0.1s">
      <label class="block text-sm text-gray-400 mb-2 font-medium">IP Address</label>
      <div class="flex gap-3">
        <input id="ip-input" type="text" placeholder="e.g. 192.168.1.1 or 8.8.8.8"
          class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
      </div>
      <button onclick="classify()"
        class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition glow">
        Classify
      </button>
    </div>

    <div id="results" class="hidden glass rounded-2xl p-6 fade-up space-y-4" style="animation-delay:0.2s">
      <!-- Valid badge + version -->
      <div class="flex items-center justify-between">
        <div id="valid-badge" class="px-3 py-1 rounded-full text-sm font-bold"></div>
        <div id="version-badge" class="px-3 py-1 rounded-full text-sm font-mono font-bold bg-blue-500/10 border border-blue-500/20 text-blue-400"></div>
      </div>

      <!-- Description -->
      <div id="description" class="text-lg font-semibold text-white"></div>

      <!-- IP Class -->
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-400">IP Class:</span>
        <span id="ip-class" class="font-bold text-purple-400 text-lg font-mono"></span>
      </div>

      <!-- Boolean flags -->
      <div class="grid grid-cols-2 gap-3" id="flags-grid"></div>
    </div>

    <div id="error-box" class="hidden glass rounded-2xl p-4 text-red-400 text-sm text-center mt-4"></div>
  </div>

  <script>
    const API = '';

    document.getElementById('ip-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') classify();
    });

    function flag(label, value) {
      const col = value ? 'rgba(46,229,157,0.1)' : 'rgba(255,255,255,0.03)';
      const txt = value ? '#2EE59D'               : 'rgba(230,234,242,0.4)';
      const bdr = value ? 'rgba(46,229,157,0.2)'  : 'rgba(255,255,255,0.08)';
      return `<div style="background:${col};border:1px solid ${bdr};color:${txt}" class="rounded-xl p-3 text-sm font-medium text-center">
        ${value ? '✓' : '○'} ${label}
      </div>`;
    }

    async function classify() {
      const ip = document.getElementById('ip-input').value.trim();
      if (!ip) return;
      document.getElementById('error-box').classList.add('hidden');

      try {
        const res  = await fetch(`${API}/classify`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ ip }),
        });
        const d = await res.json();

        document.getElementById('results').classList.remove('hidden');

        const validBadge = document.getElementById('valid-badge');
        validBadge.textContent  = d.valid ? '✓ Valid' : '✗ Invalid';
        validBadge.style.background = d.valid ? 'rgba(46,229,157,0.1)' : 'rgba(255,77,77,0.1)';
        validBadge.style.color      = d.valid ? '#2EE59D'              : '#FF4D4D';
        validBadge.style.border     = `1px solid ${d.valid ? 'rgba(46,229,157,0.2)' : 'rgba(255,77,77,0.2)'}`;

        document.getElementById('version-badge').textContent = d.version;
        document.getElementById('description').textContent   = d.description;
        document.getElementById('ip-class').textContent      = d.ip_class !== 'N/A' ? `Class ${d.ip_class}` : 'N/A';

        document.getElementById('flags-grid').innerHTML = [
          flag('Private',   d.is_private),
          flag('Global',    d.is_global),
          flag('Loopback',  d.is_loopback),
          flag('Multicast', d.is_multicast),
        ].join('');
      } catch (err) {
        document.getElementById('error-box').textContent = `Error: ${err.message}`;
        document.getElementById('error-box').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
